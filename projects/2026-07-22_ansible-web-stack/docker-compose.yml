version: '3.8'

services:
  web1:
    image: ubuntu:22.04
    container_name: web1
    hostname: web1
    networks:
      - devops-net
    ports:
      - "8080:80"
      - "2201:22"
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server sudo curl git && mkdir -p /run/sshd && /usr/sbin/sshd -D"
    environment:
      - DEBIAN_FRONTEND=noninteractive

  web2:
    image: ubuntu:22.04
    container_name: web2
    hostname: web2
    networks:
      - devops-net
    ports:
      - "8081:80"
      - "2202:22"
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server sudo curl git && mkdir -p /run/sshd && /usr/sbin/sshd -D"
    environment:
      - DEBIAN_FRONTEND=noninteractive

  db1:
    image: ubuntu:22.04
    container_name: db1
    hostname: db1
    networks:
      - devops-net
    ports:
      - "5432:5432"
      - "2203:22"
    command: /bin/bash -c "apt-get update && apt-get install -y openssh-server sudo curl git && mkdir -p /run/sshd && /usr/sbin/sshd -D"
    environment:
      - DEBIAN_FRONTEND=noninteractive

networks:
  devops-net:
    driver: bridge
