---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Create Nginx document root directory
  file:
    path: "{{ nginx_document_root }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Copy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: reload nginx

- name: Create sample index.html
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head>
          <title>DevOps Stack - {{ inventory_hostname }}</title>
          <style>
              body { font-family: Arial; margin: 40px; background: #f0f0f0; }
              .container { background: white; padding: 20px; border-radius: 5px; }
              h1 { color: #333; }
              .info { color: #666; }
          </style>
      </head>
      <body>
          <div class="container">
              <h1>Welcome to {{ app_name }}</h1>
              <p class="info">Server: {{ inventory_hostname }} ({{ ansible_default_ipv4.address }})</p>
              <p class="info">Deployed via Ansible on {{ ansible_date_time.iso8601 }}</p>
          </div>
      </body>
      </html>
    dest: "{{ nginx_document_root }}/index.html"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes
