# Staging Inventory
# Smaller setup for staging environment testing

[all:vars]
ansible_user=ubuntu
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[webservers]
staging-web1.example.com ansible_host=10.0.1.10

[databases]
staging-db1.example.com ansible_host=10.0.1.20

[staging:children]
webservers
databases
