# Production Inventory
# Replace IPs with your actual server addresses

[all:vars]
# Global variables for all hosts
ansible_user=ubuntu
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[webservers]
# Web server group - configure Nginx
web1.example.com ansible_host=192.168.1.10
web2.example.com ansible_host=192.168.1.11

[databases]
# Database server group - configure PostgreSQL
db1.example.com ansible_host=192.168.1.20

[monitoring]
# Monitoring servers - configure monitoring stack
mon1.example.com ansible_host=192.168.1.30

# Group all production servers
[production:children]
webservers
databases
monitoring
