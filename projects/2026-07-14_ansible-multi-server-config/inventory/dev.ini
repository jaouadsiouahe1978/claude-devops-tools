# Development Inventory (for Docker containers)
# Used for testing Ansible playbooks locally with Docker

[all:vars]
ansible_user=root
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
ansible_password=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[webservers]
server1 ansible_host=172.20.0.10
server2 ansible_host=172.20.0.11

[databases]
server3 ansible_host=172.20.0.20

[dev:children]
webservers
databases
