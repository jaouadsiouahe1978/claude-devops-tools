---
# Database role tasks

- name: Add PostgreSQL repository
  apt_repository:
    repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: postgresql
  tags: postgresql

- name: Add PostgreSQL GPG key
  apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present
  tags: postgresql

- name: Install PostgreSQL packages
  apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - "postgresql-contrib-{{ postgres_version }}"
      - python3-psycopg2
    state: present
  tags: postgresql
  notify: restart postgresql

- name: Create backup directory
  file:
    path: "{{ backup_path }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  when: backup_enabled
  tags: backup

- name: Configure PostgreSQL
  template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: '0644'
  tags: postgresql
  notify: restart postgresql

- name: Configure PostgreSQL pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: '0640'
  tags: postgresql
  notify: restart postgresql

- name: Start PostgreSQL service
  systemd:
    name: postgresql
    enabled: yes
    state: started
  tags: postgresql

- name: Create databases
  postgresql_db:
    name: "{{ item.name }}"
    encoding: "{{ item.encoding | default('UTF8') }}"
    lc_collate: "{{ item.lc_collate | default('C.UTF-8') }}"
    lc_ctype: "{{ item.lc_ctype | default('C.UTF-8') }}"
    state: present
  become: yes
  become_user: postgres
  loop: "{{ postgres_databases }}"
  when: postgres_databases | length > 0
  tags: database

- name: Create database users
  postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ item.role_attr_flags | default('') }}"
    state: present
  become: yes
  become_user: postgres
  loop: "{{ postgres_users }}"
  when: postgres_users | length > 0
  tags: database
  no_log: yes

- name: Grant database privileges
  postgresql_privs:
    db: "{{ item.db | default('postgres') }}"
    role: "{{ item.name }}"
    objs: "{{ item.objs | default('') }}"
    privs: "{{ item.privs | default('CONNECT,CREATE') }}"
    type: "{{ item.type | default('database') }}"
    state: present
  become: yes
  become_user: postgres
  loop: "{{ postgres_users }}"
  when: postgres_users | length > 0
  tags: database

- name: Configure backup cron job
  cron:
    name: "PostgreSQL daily backup"
    hour: "2"
    minute: "0"
    job: "{{ backup_path }}/backup.sh"
    user: postgres
    state: present
  when: backup_enabled
  tags: backup

- name: Create backup script
  template:
    src: backup.sh.j2
    dest: "{{ backup_path }}/backup.sh"
    owner: postgres
    group: postgres
    mode: '0700'
  when: backup_enabled
  tags: backup

- name: Display PostgreSQL info
  debug:
    msg: |
      PostgreSQL {{ postgres_version }} installed on {{ inventory_hostname }}
      Port: {{ postgres_port }}
      Databases: {{ postgres_databases | map(attribute='name') | list }}
      Users: {{ postgres_users | map(attribute='name') | list }}
  tags: always
