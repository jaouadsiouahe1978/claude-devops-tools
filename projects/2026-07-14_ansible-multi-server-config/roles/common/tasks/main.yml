---
# Common role tasks

- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags: packages

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present
  when: ansible_os_family == "Debian"
  tags: packages
  register: packages_installed

- name: Set system timezone
  timezone:
    name: "{{ system_timezone }}"
  tags: system

- name: Configure NTP
  apt:
    name: chrony
    state: present
  when: system_ntp_enabled and ansible_os_family == "Debian"
  tags: ntp
  notify: restart chrony

- name: Start and enable NTP service
  systemd:
    name: chrony
    enabled: yes
    state: started
  when: system_ntp_enabled
  tags: ntp

- name: Configure SSH security
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
    state: present
  loop:
    - { key: "PermitRootLogin", value: "{{ ssh_permit_root_login }}" }
    - { key: "PasswordAuthentication", value: "{{ ssh_password_authentication }}" }
    - { key: "PubkeyAuthentication", value: "yes" }
    - { key: "Port", value: "{{ ssh_port }}" }
  tags: ssh
  notify: restart sshd

- name: Enable firewall
  ufw:
    state: enabled
  when: firewall_enabled and ansible_os_family == "Debian"
  tags: firewall

- name: Configure firewall rules
  ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ firewall_rules_accept | default(['22/tcp']) }}"
  when: firewall_enabled and ansible_os_family == "Debian"
  tags: firewall

- name: Enable automatic security updates
  apt:
    name: unattended-upgrades
    state: present
  when: security_updates and ansible_os_family == "Debian"
  tags: security

- name: Configure unattended-upgrades
  template:
    src: unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
  when: security_updates and ansible_os_family == "Debian"
  tags: security

- name: Create monitoring user
  user:
    name: monitoring
    shell: /bin/bash
    createhome: yes
    state: present
  when: enable_monitoring
  tags: monitoring

- name: Display system facts
  debug:
    msg: |
      System: {{ ansible_distribution }} {{ ansible_distribution_version }}
      Timezone: {{ system_timezone }}
      Packages installed: {{ packages_installed.changed }}
  tags: always
