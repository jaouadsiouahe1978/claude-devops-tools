[defaults]
# Inventory file
inventory = inventory/production.ini

# Remote user
remote_user = ubuntu

# SSH key identity
private_key_file = ~/.ssh/ansible_key

# Number of parallel processes
forks = 5

# Disable SSH host key checking (enable only in dev, use with caution)
host_key_checking = False

# Roles path
roles_path = ./roles

# Enable fact caching to speed up playbook runs
fact_caching = jsonfile
fact_caching_connection = .ansible/facts
fact_caching_timeout = 86400

# Gathering facts
gather_facts = yes

# Gather subset for faster runs (comment to gather all facts)
gather_subset = all

# Increase SSH timeout
timeout = 10

# Use paramiko as fallback
transport = ssh

# Display skipped hosts
display_skipped_hosts = True

# Display task output
force_color = True

[privilege_escalation]
# Use sudo for privilege escalation
become = False
become_method = sudo
become_user = root

[ssh_connection]
# Increase SSH timeout
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10 -o StrictHostKeyChecking=no
pipelining = True
