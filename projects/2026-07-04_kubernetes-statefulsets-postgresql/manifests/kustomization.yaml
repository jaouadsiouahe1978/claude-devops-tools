apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops

resources:
- namespace.yaml
- secret.yaml
- configmap.yaml
- statefulset.yaml
- service.yaml

configMapGenerator:
- name: init-scripts
  files:
  - ../init-scripts/init.sql

replicas:
- name: postgres
  count: 3

commonLabels:
  app: postgres
  version: "15"
  environment: devops

commonAnnotations:
  description: "PostgreSQL StatefulSet with persistent storage"
  managed-by: "kustomize"
  date: "2026-07-04"
