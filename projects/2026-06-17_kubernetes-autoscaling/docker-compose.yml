version: '3.8'

services:
  # Application principale
  devops-app-1:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: devops-app-1
    ports:
      - "5001:5000"
    environment:
      ENVIRONMENT: docker-compose
      PORT: 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - devops-network

  # Réplica 2
  devops-app-2:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: devops-app-2
    ports:
      - "5002:5000"
    environment:
      ENVIRONMENT: docker-compose
      PORT: 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - devops-network

  # Réplica 3
  devops-app-3:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: devops-app-3
    ports:
      - "5003:5000"
    environment:
      ENVIRONMENT: docker-compose
      PORT: 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - devops-network

  # Load Balancer (Nginx)
  nginx:
    image: nginx:latest
    container_name: devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - devops-app-1
      - devops-app-2
      - devops-app-3
    networks:
      - devops-network
    restart: unless-stopped

networks:
  devops-network:
    driver: bridge
