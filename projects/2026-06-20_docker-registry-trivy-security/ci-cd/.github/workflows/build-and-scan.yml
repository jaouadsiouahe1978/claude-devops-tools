name: Build & Scan Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'images/**'
      - 'Dockerfile'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: localhost:5000
  IMAGE_NAME: demo/app

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./images/nodejs
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
        if: always()

      - name: Run Trivy for JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'

      - name: Check for Critical vulnerabilities
        run: |
          CRITICAL=$(jq '.Results[0].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy-report.json | wc -l)
          if [ $CRITICAL -gt 0 ]; then
            echo "❌ Found $CRITICAL CRITICAL vulnerabilities"
            exit 1
          fi
          echo "✅ No CRITICAL vulnerabilities found"

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'cyclonedx'
          output: 'sbom.xml'

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            trivy-report.json
            sbom.xml
        if: always()

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('trivy-report.json', 'utf8'));

            let vulnText = 'No vulnerabilities found ✅';
            if (report.Results[0]?.Vulnerabilities) {
              const vulns = report.Results[0].Vulnerabilities;
              const bySeverity = {};
              vulns.forEach(v => {
                bySeverity[v.Severity] = (bySeverity[v.Severity] || 0) + 1;
              });

              vulnText = Object.entries(bySeverity)
                .map(([s, c]) => `${s}: ${c}`)
                .join(' | ');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Trivy Security Scan\n\n${vulnText}\n\n[Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning)`
            });
