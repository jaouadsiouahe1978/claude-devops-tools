---
# Handlers for webserver role - triggered by notify

- name: restart nginx
  systemd:
    name: nginx
    state: restarted
  listen: "restart nginx"

- name: reload nginx
  systemd:
    name: nginx
    state: reloaded
  listen: "reload nginx"

- name: restart php-fpm
  systemd:
    name: "php{{ php_version }}-fpm"
    state: restarted
  listen: "restart php-fpm"
