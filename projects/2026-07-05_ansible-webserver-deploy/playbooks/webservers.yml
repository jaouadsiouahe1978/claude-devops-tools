---
# Standalone playbook for webserver deployment

- name: Deploy webservers
  hosts: webservers
  become: yes
  gather_facts: yes
  pre_tasks:
    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist
      tags: system-update

  roles:
    - webserver

  post_tasks:
    - name: Verify webserver is running
      systemd:
        name: nginx
        state: started
      tags: verify

    - name: Test health check
      uri:
        url: "http://{{ ansible_default_ipv4.address }}/status.html"
        status_code: 200
      register: health_check

    - name: Display deployment result
      debug:
        msg: "✅ Webserver deployed successfully on {{ inventory_hostname }}"
      when: health_check.status == 200
