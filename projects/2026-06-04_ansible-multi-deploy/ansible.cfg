[defaults]
# Fichier inventaire par défaut
inventory = inventories/production.ini

# User par défaut pour connexion SSH
remote_user = ansible

# Chemin vers la clé SSH privée
private_key_file = ~/.ssh/id_rsa

# Nombre de forks parallèles (machines exécutées en parallèle)
forks = 10

# Timeout SSH en secondes
timeout = 20

# Désactiver host key checking (à utiliser avec prudence)
host_key_checking = False

# Utiliser smart connection plugin (recommandé)
smart_connection = True

# Logging
log_path = ./ansible.log

# Gather facts en parallèle
gather_subset = all
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

[privilege_escalation]
# Utiliser sudo pour les commandes root
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Utiliser pipelining pour réduire les connexions SSH
pipelining = True

# Control path pour réutiliser connexions SSH
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
