# Staging Inventory - Environnement de test
# Réplique minimaliste de production pour tests

[webservers]
web-staging ansible_host=192.168.1.100 ansible_port=22

[monitoring]
monitor-staging ansible_host=192.168.1.101 ansible_port=22

[staging:children]
webservers
monitoring

[staging:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
env=staging
datacenter=DC-TEST
