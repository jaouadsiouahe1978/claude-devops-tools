# Production Inventory for Multi-Server Deployment
# Groupes de serveurs pour organiser l'infrastructure

[webservers]
# Serveurs web Nginx
web1 ansible_host=10.0.1.10 ansible_port=22 role=primary
web2 ansible_host=10.0.1.11 ansible_port=22 role=secondary
web3 ansible_host=10.0.1.12 ansible_port=22 role=secondary

[monitoring]
# Serveur de monitoring Prometheus
monitor1 ansible_host=10.0.1.20 ansible_port=22

[databases]
# Serveurs database (exemple pour extension future)
db1 ansible_host=10.0.2.10 ansible_port=22

[load_balancers]
# Load balancers (exemple pour extension future)
lb1 ansible_host=10.0.3.10 ansible_port=22

# Groupes composés
[webcluster:children]
webservers

[infrastructure:children]
webservers
monitoring
databases
load_balancers

[production:children]
infrastructure

# Variables globales pour le groupe
[all:vars]
# Connexion SSH
ansible_user=ansible
ansible_password=ansible
ansible_connection=ssh

# Python
ansible_python_interpreter=/usr/bin/python3

# Environnement
env=production
datacenter=DC1
