---
# Webserver Role - Installation et configuration Nginx

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  tags:
    - nginx
    - webserver

- name: Create Nginx directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop:
    - /var/www/html
    - /var/www/logs
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
    - /etc/nginx/conf.d
  tags:
    - nginx
    - webserver

- name: Create self-signed certificate (for testing)
  shell: |
    openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      -keyout /etc/ssl/private/nginx-selfsigned.key \
      -out /etc/ssl/certs/nginx-selfsigned.crt \
      -subj "/C=FR/ST=Auvergne/L=Grenoble/O=DevOps/CN=localhost"
  args:
    creates: /etc/ssl/certs/nginx-selfsigned.crt
  tags:
    - nginx
    - ssl

- name: Create Nginx default virtualhost config
  template:
    src: nginx_default.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: reload nginx
  tags:
    - nginx
    - config

- name: Enable default site
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    owner: root
    group: root
    state: link
  notify: reload nginx
  tags:
    - nginx
    - config

- name: Create Nginx main config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: reload nginx
  tags:
    - nginx
    - config

- name: Create sample HTML page
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head>
          <title>DevOps Server</title>
          <style>
              body { font-family: Arial, sans-serif; margin: 40px; }
              .info { background: #f0f0f0; padding: 20px; border-radius: 5px; }
              h1 { color: #333; }
              .timestamp { color: #666; font-size: 12px; }
          </style>
      </head>
      <body>
          <h1>🚀 DevOps Server Online</h1>
          <div class="info">
              <p><strong>Hostname:</strong> {{ inventory_hostname }}</p>
              <p><strong>Environment:</strong> {{ env }}</p>
              <p><strong>IP Address:</strong> {{ ansible_default_ipv4.address }}</p>
              <p><strong>OS:</strong> {{ ansible_distribution }} {{ ansible_distribution_version }}</p>
              <p class="timestamp">Last updated: {{ ansible_date_time.iso8601 }}</p>
          </div>
      </body>
      </html>
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  tags:
    - nginx
    - content

- name: Configure Nginx logrotate
  copy:
    content: |
      /var/log/nginx/*.log {
          daily
          missingok
          rotate 14
          compress
          delaycompress
          notifempty
          create 0640 www-data adm
          sharedscripts
          postrotate
              if [ -f /var/run/nginx.pid ]; then \
                  kill -USR1 `cat /var/run/nginx.pid`; \
              fi
          endscript
      }
    dest: /etc/logrotate.d/nginx
    owner: root
    group: root
    mode: '0644'
  tags:
    - nginx
    - logging

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started
    daemon_reload: yes
  tags:
    - nginx
    - services

- name: Open HTTP and HTTPS in firewall
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - '80'
    - '443'
  when: ansible_os_family == "Debian"
  tags:
    - nginx
    - firewall

- name: Test Nginx configuration
  shell: nginx -t
  changed_when: false
  tags:
    - nginx
    - test

- name: Print Nginx info
  debug:
    msg: |
      ============================================
      Nginx installed on: {{ inventory_hostname }}
      HTTP: http://{{ ansible_default_ipv4.address }}
      HTTPS: https://{{ ansible_default_ipv4.address }}
      Config: /etc/nginx/nginx.conf
      Sites: /etc/nginx/sites-available
      ============================================
  tags:
    - nginx
    - debug
