---
# Common Tasks - Tâches exécutées sur tous les serveurs

- name: Update system packages
  apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"
  tags:
    - common
    - packages

- name: Install basic packages
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - curl
    - wget
    - git
    - htop
    - net-tools
    - vim
    - jq
    - openssh-client
    - openssh-server
    - python3-pip
    - sudo
  when: ansible_os_family == "Debian"
  tags:
    - common
    - packages

- name: Install basic packages (RedHat)
  yum:
    name: "{{ item }}"
    state: present
  loop:
    - curl
    - wget
    - git
    - htop
    - net-tools
    - vim
    - jq
    - openssh-clients
    - openssh-server
    - python3-pip
    - sudo
  when: ansible_os_family == "RedHat"
  tags:
    - common
    - packages

- name: Set timezone
  timezone:
    name: "{{ system_timezone | default('UTC') }}"
  notify: restart cron
  tags:
    - common
    - timezone

- name: Configure SSH - Disable password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: restart ssh
  tags:
    - common
    - ssh

- name: Configure SSH - Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: restart ssh
  tags:
    - common
    - ssh

- name: Create ansible user
  user:
    name: ansible
    comment: "Ansible Automation User"
    shell: /bin/bash
    home: /home/ansible
    createhome: yes
    state: present
  tags:
    - common
    - users

- name: Add ansible to sudoers
  lineinfile:
    path: /etc/sudoers
    regexp: "^ansible"
    line: "ansible ALL=(ALL) NOPASSWD:ALL"
    validate: 'visudo -cf %s'
    state: present
  tags:
    - common
    - users

- name: Configure system limits
  lineinfile:
    path: /etc/security/limits.conf
    regexp: "^{{ item.domain }}\\s+{{ item.type }}\\s+{{ item.item }}"
    line: "{{ item.domain }} {{ item.type }} {{ item.item }} {{ item.value }}"
    state: present
  loop:
    - { domain: '*', type: 'soft', item: 'nofile', value: '65535' }
    - { domain: '*', type: 'hard', item: 'nofile', value: '65535' }
    - { domain: '*', type: 'soft', item: 'nproc', value: '4096' }
    - { domain: '*', type: 'hard', item: 'nproc', value: '4096' }
  tags:
    - common
    - limits

- name: Enable firewall (UFW)
  ufw:
    state: enabled
  when: ansible_os_family == "Debian"
  tags:
    - common
    - firewall

- name: Allow SSH through firewall
  ufw:
    rule: allow
    name: OpenSSH
  when: ansible_os_family == "Debian"
  tags:
    - common
    - firewall

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - common
    - security

- name: Start and enable services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - ssh
    - fail2ban
  tags:
    - common
    - services

- name: Create /var/log/ansible directory
  file:
    path: /var/log/ansible
    state: directory
    owner: ansible
    group: ansible
    mode: '0755'
  tags:
    - common
    - logging

- name: Print system information
  debug:
    msg: |
      ============================================
      Server: {{ inventory_hostname }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      Kernel: {{ ansible_kernel }}
      Architecture: {{ ansible_architecture }}
      IPv4: {{ ansible_default_ipv4.address }}
      Hostname: {{ ansible_hostname }}
      ============================================
  tags:
    - common
    - debug
