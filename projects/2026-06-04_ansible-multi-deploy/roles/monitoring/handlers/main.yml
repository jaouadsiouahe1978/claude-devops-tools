---
# Monitoring Handlers

- name: restart node exporter
  systemd:
    name: node_exporter
    state: restarted
    daemon_reload: yes

- name: restart prometheus
  systemd:
    name: prometheus
    state: restarted
    daemon_reload: yes

- name: reload prometheus config
  shell: kill -HUP $(pgrep prometheus)
  ignore_errors: yes
