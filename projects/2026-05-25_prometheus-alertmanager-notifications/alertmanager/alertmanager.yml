global:
  resolve_timeout: 5m
  slack_api_url: 'YOUR_SLACK_WEBHOOK_URL_HERE'

# Template par défaut
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Configuration du routage des alertes
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

  # Routes enfants pour différents niveaux de sévérité
  routes:
    # Alertes critiques - notification immédiate
    - match:
        severity: critical
      receiver: 'critical-team'
      group_wait: 5s
      group_interval: 5s
      repeat_interval: 15m
      continue: true

    # Alertes warning - notification groupée
    - match:
        severity: warning
      receiver: 'warning-team'
      group_wait: 30s
      repeat_interval: 2h

    # Alertes info - regroupement étendu
    - match:
        severity: info
      receiver: 'info-team'
      group_wait: 5m
      repeat_interval: 4h

# Récepteurs (destinations des notifications)
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#general'
        title: 'Alerte {{ .GroupLabels.severity }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'critical-team'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 ALERTE CRITIQUE: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts.Firing }}
          *Instance:* {{ .Labels.instance }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: false
        color: 'danger'
        actions:
          - type: button
            text: 'Voir Prometheus'
            url: 'http://localhost:9090'

  - name: 'warning-team'
    slack_configs:
      - channel: '#warnings'
        title: '⚠️  Alerte: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'warning'

  - name: 'info-team'
    slack_configs:
      - channel: '#info'
        title: 'ℹ️  Info: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'good'

# Inhibition - éviter les alertes redundantes
inhibit_rules:
  # Supprimer les alertes warning si critique existe pour le même service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Supprimer les alertes info si warning existe
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'instance']
