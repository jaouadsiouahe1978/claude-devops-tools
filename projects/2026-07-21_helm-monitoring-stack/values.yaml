# Helm Chart Values for Monitoring Stack
# Prometheus + Grafana + node-exporter + kube-state-metrics

namespace: monitoring

# Prometheus Configuration
prometheus:
  enabled: true
  replicaCount: 1
  image:
    repository: prom/prometheus
    tag: v2.50.0
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false
    size: 10Gi
    storageClass: "standard"

  retention:
    time: "15d"
    size: "512MB"

  scrape_interval: "15s"
  evaluation_interval: "15s"

# Grafana Configuration
grafana:
  enabled: true
  replicaCount: 1
  image:
    repository: grafana/grafana
    tag: "10.2.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  adminUser: admin
  adminPassword: admin

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: false
    size: 2Gi
    storageClass: "standard"

# Node Exporter Configuration (DaemonSet)
nodeExporter:
  enabled: true
  image:
    repository: prom/node-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9100
    targetPort: 9100

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Kube State Metrics Configuration
kubeStateMetrics:
  enabled: true
  replicaCount: 1
  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: v2.10.0
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# RBAC Configuration
rbac:
  create: true

# Service Account
serviceAccount:
  create: true
  name: monitoring

# Labels
labels:
  app: monitoring-stack
  version: "1.0"
