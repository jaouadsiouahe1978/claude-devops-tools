---
# Monitoring deployment
# Install node_exporter on all servers

- name: "Deploy Monitoring Agents"
  hosts: all
  become: yes
  gather_facts: yes

  roles:
    - monitoring

  post_tasks:
    - name: Monitoring deployment summary
      debug:
        msg: |
          ✓ Monitoring Agent Deployed!
          - Server: {{ inventory_hostname }}
          - Metrics port: 9100
          - Metrics URL: http://localhost:9100/metrics
