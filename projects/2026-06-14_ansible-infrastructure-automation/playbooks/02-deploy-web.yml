---
# Web server deployment
# Install and configure Nginx with SSL

- name: "Deploy Web Servers"
  hosts: webservers
  become: yes
  gather_facts: yes

  roles:
    - webserver

  post_tasks:
    - name: Verify web server
      block:
        - name: Check HTTP port
          wait_for:
            port: "{{ nginx_port }}"
            timeout: 5

        - name: Check HTTPS port
          wait_for:
            port: "{{ nginx_ssl_port }}"
            timeout: 5

        - name: Test web response
          shell: curl -k -s https://localhost/health | grep -q healthy
          register: health_check
          changed_when: false

        - name: Web deployment summary
          debug:
            msg: |
              ✓ Web Server Deployed!
              - HTTP port: {{ nginx_port }}
              - HTTPS port: {{ nginx_ssl_port }}
              - App home: {{ app_home }}
              - SSL cert: {{ ssl_cert_path }}
              - Status: {{ 'Running' if health_check.rc == 0 else 'Not responding' }}

      rescue:
        - name: Show Nginx status
          shell: systemctl status nginx
          changed_when: false
