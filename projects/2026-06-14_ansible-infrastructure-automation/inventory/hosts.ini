# Ansible Inventory - Infrastructure Example
# Grouper les serveurs par rôle pour une gestion facilitée

[local]
localhost ansible_connection=local ansible_python_interpreter={{ansible_playbook_python}}

[webservers]
web1 ansible_host=127.0.0.1 ansible_port=2201 ansible_user=root
web2 ansible_host=127.0.0.1 ansible_port=2202 ansible_user=root

[databases]
db1 ansible_host=127.0.0.1 ansible_port=2203 ansible_user=root

[monitoring]
monitor1 ansible_host=127.0.0.1 ansible_port=2204 ansible_user=root

# Variables globales appliquées à tous les hôtes
[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ntp_server=pool.ntp.org
timezone=Europe/Paris

# Grouper les groupes pour appliquer des configs communes
[production:children]
webservers
databases
monitoring

[production:vars]
environment=production
deploy_user=deploy
log_level=warn
