---
- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.6.0/node_exporter-1.6.0.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter.tar.gz"
    mode: '0644'
  register: node_exporter_download

- name: Extract node_exporter
  unarchive:
    src: "/tmp/node_exporter.tar.gz"
    dest: "/tmp"
    remote_src: yes
  when: node_exporter_download.changed

- name: Install node_exporter
  copy:
    src: "/tmp/node_exporter-1.6.0.linux-amd64/node_exporter"
    dest: "/usr/local/bin/node_exporter"
    remote_src: yes
    mode: '0755'

- name: Create node_exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  notify: reload systemd

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for node_exporter to be ready
  wait_for:
    port: 9100
    delay: 2
    timeout: 10

- name: Test node_exporter metrics
  uri:
    url: "http://localhost:9100/metrics"
    status_code: 200
  register: metrics_test
  retries: 3
  delay: 2

- name: Display node_exporter status
  debug:
    msg: "Node exporter is running and exposing metrics"
  when: metrics_test.status == 200

- name: Cleanup temp files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter.tar.gz"
    - "/tmp/node_exporter-1.6.0.linux-amd64"
