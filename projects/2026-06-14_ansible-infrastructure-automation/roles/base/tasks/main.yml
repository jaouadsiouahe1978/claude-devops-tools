---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install system packages
  package:
    name: "{{ system_packages }}"
    state: present

- name: Configure timezone
  timezone:
    name: "{{ timezone }}"

- name: Set locale
  locale_gen:
    name: "{{ locale }}"
    state: present

- name: Configure NTP
  block:
    - name: Install chrony
      package:
        name: chrony
        state: present

    - name: Configure chrony
      template:
        src: chrony.conf.j2
        dest: /etc/chrony/chrony.conf
        backup: yes
      notify: restart chrony

    - name: Enable and start chrony
      systemd:
        name: chrony
        enabled: yes
        state: started

- name: Configure SSH hardening
  block:
    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#PermitRootLogin'
        line: 'PermitRootLogin no'
        backup: yes
      notify: restart sshd

    - name: Disable password auth
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: restart sshd

    - name: Set SSH port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#Port'
        line: 'Port 22'
      notify: restart sshd

- name: Configure firewall (UFW)
  block:
    - name: Install UFW
      package:
        name: ufw
        state: present

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow HTTP
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: '443'
        proto: tcp

- name: Setup deploy user
  block:
    - name: Create deploy group
      group:
        name: "{{ deploy_group }}"
        state: present

    - name: Create deploy user
      user:
        name: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        groups: sudo
        home: "/home/{{ deploy_user }}"
        shell: /bin/bash
        createhome: yes
        state: present

    - name: Add sudoers entry for deploy user
      lineinfile:
        path: /etc/sudoers
        line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
        validate: /usr/sbin/visudo -cf %s

- name: Enable auto-updates
  block:
    - name: Install unattended-upgrades
      package:
        name: unattended-upgrades
        state: present
      when: auto_updates | default(false)

    - name: Configure auto-updates
      template:
        src: unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        backup: yes
      when: auto_updates | default(false)

- name: System limits and performance
  block:
    - name: Increase file descriptors
      lineinfile:
        path: /etc/security/limits.conf
        line: "{{ item }}"
      loop:
        - "* soft nofile 65536"
        - "* hard nofile 65536"
        - "* soft nproc 65536"
        - "* hard nproc 65536"

    - name: Configure sysctl
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: yes
      loop:
        - { name: "vm.swappiness", value: "10" }
        - { name: "net.ipv4.tcp_fin_timeout", value: "30" }
        - { name: "net.ipv4.tcp_tw_reuse", value: "1" }

- name: Install monitoring agent
  block:
    - name: Install node_exporter dependencies
      package:
        name: "{{ item }}"
        state: present
      loop:
        - wget
        - tar

- name: Print system info
  debug:
    msg: |
      System setup completed:
      - Hostname: {{ ansible_hostname }}
      - OS: {{ ansible_os_family }} {{ ansible_distribution_version }}
      - Python: {{ ansible_python_version }}
      - Memory: {{ ansible_memtotal_mb }} MB
      - CPU cores: {{ ansible_processor_vcpus }}
