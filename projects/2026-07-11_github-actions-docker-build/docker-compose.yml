version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-actions-demo-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      RUNNING_IN_DOCKER: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./app:/app
    labels:
      com.example.description: "GitHub Actions Docker Demo"
      com.example.version: "1.0.0"

  # Optional: Nginx reverse proxy for production simulation
  nginx:
    image: nginx:alpine
    container_name: github-actions-demo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
