name: Docker Test Build

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'Dockerfile'
      - '.github/workflows/docker-test.yml'
      - '.dockerignore'
  push:
    branches:
      - '**'
      - '!main'
      - '!develop'

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: test-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run --rm -d \
            --name test-container \
            -p 3000:3000 \
            -e NODE_ENV=test \
            test-app:test

      - name: Wait for app to start
        run: |
          echo "⏳ Waiting for application to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Application is ready!"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 1
          done
          echo "❌ Application failed to start"
          docker logs test-container
          exit 1

      - name: Test health endpoint
        run: |
          echo "🧪 Testing health endpoint..."
          curl -v http://localhost:3000/health
          echo ""
          curl -s http://localhost:3000/health | jq .

      - name: Test info endpoint
        run: |
          echo "🧪 Testing info endpoint..."
          curl -s http://localhost:3000/info | jq .

      - name: Test metrics endpoint
        run: |
          echo "🧪 Testing metrics endpoint..."
          curl -s http://localhost:3000/metrics | jq .

      - name: Test main endpoint
        run: |
          echo "🧪 Testing main endpoint..."
          curl -s http://localhost:3000/ | jq .

      - name: Test 404 endpoint
        run: |
          echo "🧪 Testing 404 handling..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/nonexistent)
          if [ $HTTP_CODE -eq 404 ]; then
            echo "✅ 404 handling works correctly"
          else
            echo "❌ Expected 404, got $HTTP_CODE"
            exit 1
          fi

      - name: Check container logs
        if: always()
        run: |
          echo "📋 Container logs:"
          docker logs test-container

      - name: Check image size
        run: |
          echo "📦 Docker image size:"
          docker images test-app:test

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true

      - name: Build success
        if: success()
        run: |
          echo "✅ All tests passed!"
          echo "The Docker image is ready for production."

      - name: Build failed
        if: failure()
        run: |
          echo "❌ Tests failed!"
          echo "Please check the logs above."
