<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Todo App - Docker Full-Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .status-item {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 5px;
            background: #f0f0f0;
        }

        .status-item.ok {
            background: #d4edda;
            color: #155724;
        }

        .status-item.error {
            background: #f8d7da;
            color: #721c24;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .todos-list {
            list-style: none;
        }

        .todo-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
            color: #333;
        }

        .todo-delete {
            background: #dc3545;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 3px;
        }

        .todo-delete:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .counter {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Todo App</h1>
            <p>Stack Docker Full-Stack</p>
            <div class="status">
                <div class="status-item" id="db-status">🔌 Base de données</div>
                <div class="status-item" id="api-status">🚀 API</div>
            </div>
        </header>

        <div id="error-container"></div>
        <div id="info-container"></div>

        <div class="input-group">
            <input
                type="text"
                id="todo-input"
                placeholder="Ajouter une nouvelle tâche..."
                autocomplete="off"
            >
            <button onclick="addTodo()">Ajouter</button>
        </div>

        <ul class="todos-list" id="todos-list">
            <li class="loading">Chargement des tâches...</li>
        </ul>

        <div class="counter">
            <span id="total-todos">0</span> tâche(s) •
            <span id="completed-todos">0</span> complétée(s)
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const input = document.getElementById('todo-input');
        const todosList = document.getElementById('todos-list');
        const errorContainer = document.getElementById('error-container');
        const infoContainer = document.getElementById('info-container');

        // Vérifier la connexion à l'API au chargement
        window.addEventListener('load', async () => {
            await checkHealth();
            await loadTodos();
            input.focus();
        });

        // Permettre d'ajouter avec Entrée
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    updateStatusItem('db-status', '✅ Base de données', 'ok');
                    updateStatusItem('api-status', '✅ API', 'ok');
                    showInfo('Connexion établie avec succès');
                } else {
                    throw new Error('API unhealthy');
                }
            } catch (err) {
                updateStatusItem('db-status', '❌ Base de données', 'error');
                updateStatusItem('api-status', '❌ API', 'error');
                showError('Impossible de se connecter à l\'API backend');
            }
        }

        function updateStatusItem(id, text, status) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `status-item ${status}`;
        }

        async function loadTodos() {
            try {
                const response = await fetch(`${API_URL}/todos`);
                if (!response.ok) throw new Error('Erreur au chargement');

                const result = await response.json();
                const todos = result.data || [];

                todosList.innerHTML = '';
                if (todos.length === 0) {
                    todosList.innerHTML = '<li class="loading">Aucune tâche. Commencez à en créer! 🎯</li>';
                } else {
                    todos.forEach(todo => renderTodo(todo));
                }

                updateCounter(todos);
                clearError();
            } catch (err) {
                showError(`Erreur: ${err.message}`);
            }
        }

        function renderTodo(todo) {
            const li = document.createElement('li');
            li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <input
                    type="checkbox"
                    ${todo.completed ? 'checked' : ''}
                    onchange="toggleTodo(${todo.id}, this.checked)"
                >
                <span class="todo-text">${escapeHtml(todo.title)}</span>
                <button class="todo-delete" onclick="deleteTodo(${todo.id})">
                    Supprimer
                </button>
            `;
            todosList.appendChild(li);
        }

        async function addTodo() {
            const title = input.value.trim();
            if (!title) {
                showError('Veuillez entrer une tâche');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/todos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title }),
                });

                if (!response.ok) throw new Error('Erreur création');

                input.value = '';
                input.focus();
                await loadTodos();
                showInfo('Tâche ajoutée avec succès');
            } catch (err) {
                showError(`Erreur: ${err.message}`);
            }
        }

        async function toggleTodo(id, completed) {
            try {
                const response = await fetch(`${API_URL}/todos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed }),
                });

                if (!response.ok) throw new Error('Erreur update');
                await loadTodos();
            } catch (err) {
                showError(`Erreur: ${err.message}`);
                await loadTodos();
            }
        }

        async function deleteTodo(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cette tâche?')) return;

            try {
                const response = await fetch(`${API_URL}/todos/${id}`, {
                    method: 'DELETE',
                });

                if (!response.ok) throw new Error('Erreur suppression');
                await loadTodos();
                showInfo('Tâche supprimée');
            } catch (err) {
                showError(`Erreur: ${err.message}`);
            }
        }

        function updateCounter(todos) {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            document.getElementById('total-todos').textContent = total;
            document.getElementById('completed-todos').textContent = completed;
        }

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
        }

        function showInfo(message) {
            infoContainer.innerHTML = `<div class="info-message">${escapeHtml(message)}</div>`;
            setTimeout(() => { infoContainer.innerHTML = ''; }, 3000);
        }

        function clearError() {
            errorContainer.innerHTML = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
