version: '3.9'

services:
  # Service PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: devops_db
    environment:
      POSTGRES_USER: ${DB_USER:-devops_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devops_pass}
      POSTGRES_DB: ${DB_NAME:-devops_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devops_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devops_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-devops_user}
      DB_PASSWORD: ${DB_PASSWORD:-devops_pass}
      DB_NAME: ${DB_NAME:-devops_db}
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - devops_network
    restart: unless-stopped

  # Service Frontend (Nginx simple)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops_web
    ports:
      - "3000:80"
    networks:
      - devops_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  devops_network:
    driver: bridge
