apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gitops-demo

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  project: gitops-demo
  managed-by: argocd
  version: v1

commonAnnotations:
  description: "GitOps Demo Application with ArgoCD"
  git-repo: "https://github.com/jaouadsiouahe1978/claude-devops-tools"

replicas:
  - name: gitops-app
    count: 3

images:
  - name: ghcr.io/jaouadsiouahe1978/claude-devops-tools/gitops-app
    newTag: latest

namePrefix: ""
nameSuffix: ""

labels:
  - includeSelectors: true
    pairs:
      environment: production
