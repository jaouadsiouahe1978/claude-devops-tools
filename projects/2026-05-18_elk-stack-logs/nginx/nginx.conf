user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Format de log personnalisé pour ELK
    log_format combined_elk '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'rt=$request_time uct="$upstream_connect_time" '
                            'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log combined_elk;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Configuration du serveur
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # Pages de test pour générer des logs
        root /var/www/html;
        index index.html index.htm;

        # Page d'accueil
        location / {
            try_files $uri $uri/ =404;
            add_header Content-Type text/html;
            return 200 '<html><body><h1>ELK Stack Demo</h1><p>Logs générés avec Nginx</p></body></html>';
        }

        # Endpoint santé
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }

        # Endpoint pour générer des erreurs 404
        location /error404 {
            return 404 "Not found\n";
        }

        # Endpoint pour générer des erreurs 500
        location /error500 {
            return 500 "Internal server error\n";
        }

        # Endpoint pour générer des redirects
        location /redirect {
            return 302 /;
        }

        # Endpoint avec timeout
        location /slow {
            add_header Content-Type text/plain;
            return 200 'Slow response';
        }

        # Logs désactivés pour health check
        location = /favicon.ico {
            access_log off;
            return 404;
        }

        location = /robots.txt {
            access_log off;
            return 404;
        }
    }
}
