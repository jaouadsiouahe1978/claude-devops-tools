input {
  # Lire les logs Nginx depuis le volume monté
  file {
    path => "/var/log/nginx/access.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^\d"
      negate => true
      what => "previous"
    }
    tags => ["nginx", "access"]
  }

  file {
    path => "/var/log/nginx/error.log"
    start_position => "beginning"
    tags => ["nginx", "error"]
  }

  # Écouter sur le port 5000 pour les logs via TCP/UDP
  tcp {
    port => 5000
    codec => json
    tags => ["tcp"]
  }

  udp {
    port => 5000
    codec => json
    tags => ["udp"]
  }
}

filter {
  # Parser les logs Nginx access
  if "nginx" in [tags] and "access" in [tags] {
    grok {
      match => {
        "message" => "%{COMBINEDAPACHELOG}"
      }
      patterns_dir => "/usr/share/logstash/patterns"
    }

    # Convertir les timestamps
    date {
      match => [ "timestamp", "dd/MMM/YYYY:HH:mm:ss Z" ]
      target => "@timestamp"
    }

    # Convertir le code de status en nombre
    mutate {
      convert => { "response" => "integer" }
      convert => { "bytes" => "integer" }
      convert => { "responsetime" => "float" }
    }

    # Categoriser les réponses
    mutate {
      add_field => { "status_category" => "unknown" }
    }

    if [response] >= 200 and [response] < 300 {
      mutate {
        replace => { "status_category" => "success" }
      }
    } else if [response] >= 300 and [response] < 400 {
      mutate {
        replace => { "status_category" => "redirect" }
      }
    } else if [response] >= 400 and [response] < 500 {
      mutate {
        replace => { "status_category" => "client_error" }
      }
    } else if [response] >= 500 {
      mutate {
        replace => { "status_category" => "server_error" }
      }
    }
  }

  # Parser les logs Nginx error
  if "nginx" in [tags] and "error" in [tags] {
    grok {
      match => {
        "message" => "%{NGINX_ERROR}"
      }
      patterns_dir => "/usr/share/logstash/patterns"
    }
  }

  # Ajouter des métadonnées
  mutate {
    add_field => { "environment" => "development" }
    add_field => { "application" => "elk-stack-demo" }
  }
}

output {
  # Envoyer vers Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "changeme"
    index => "logstash-%{+YYYY.MM.dd}"
  }

  # Afficher dans les logs Logstash pour debug (commenté en prod)
  stdout {
    codec => rubydebug
  }
}
