# Ansible Inventory - Définition des serveurs
# Remplacer les adresses IP par les vraies adresses

[webservers]
web1 ansible_host=192.168.1.10 ansible_user=ubuntu
web2 ansible_host=192.168.1.11 ansible_user=ubuntu

[databases]
db1 ansible_host=192.168.1.20 ansible_user=ubuntu

[all:vars]
# Variables globales pour tous les hosts
ansible_python_interpreter=/usr/bin/python3
ansible_connection=ssh
ansible_port=22

[webservers:vars]
# Variables spécifiques au groupe webservers
nginx_port=80
app_port=5000

[databases:vars]
# Variables spécifiques au groupe databases
postgres_port=5432
postgres_version=13
