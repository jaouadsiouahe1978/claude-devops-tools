---
# Variables spécifiques aux serveurs web

nginx_port: 80
nginx_worker_processes: auto
nginx_worker_connections: 1024

flask_app_port: 5000
flask_app_name: myapp
flask_workers: 4

# Packages à installer
webserver_packages:
  - nginx
  - python3
  - python3-pip
  - python3-venv
  - curl
  - wget
  - git
