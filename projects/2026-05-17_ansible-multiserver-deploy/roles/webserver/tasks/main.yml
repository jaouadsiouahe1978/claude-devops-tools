---
# Tâches pour configurer les serveurs web (Nginx + Flask)

- name: Install web server packages
  apt:
    name: "{{ webserver_packages }}"
    state: present

- name: Create virtualenv for Flask app
  shell: python3 -m venv {{ app_home }}/venv
  args:
    creates: "{{ app_home }}/venv"
  become_user: "{{ app_user }}"

- name: Install Flask in virtualenv
  pip:
    name:
      - flask
      - gunicorn
    virtualenv: "{{ app_home }}/venv"
    virtualenv_command: "python3 -m venv"
  become_user: "{{ app_user }}"

- name: Copy Flask application
  copy:
    src: flask_app.py
    dest: "{{ app_home }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: 0755

- name: Create Nginx configuration from template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    backup: yes
  notify: restart nginx

- name: Enable Nginx
  service:
    name: nginx
    enabled: yes
    state: started

- name: Create systemd service for Flask app
  template:
    src: flask.service.j2
    dest: "/etc/systemd/system/{{ flask_app_name }}.service"
  notify: restart flask app

- name: Enable Flask application service
  systemd:
    name: "{{ flask_app_name }}"
    enabled: yes
    daemon_reload: yes
    state: started
