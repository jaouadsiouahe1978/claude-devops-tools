apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app-multitier.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Chart.Name }}
    environment: {{ .Values.environment }}
data:
  APP_NAME: {{ .Values.config.APP_NAME | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
  ENVIRONMENT: {{ .Values.environment | quote }}
  DB_HOST: {{ include "app-multitier.fullname" . }}-postgres
  DB_PORT: {{ .Values.postgres.port | quote }}
  DB_NAME: {{ .Values.postgres.env.POSTGRES_DB | quote }}
  DB_USER: {{ .Values.postgres.env.POSTGRES_USER | quote }}
  BACKEND_SERVICE: {{ include "app-multitier.fullname" . }}-backend

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app-multitier.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Chart.Name }}
type: Opaque
stringData:
  DB_PASSWORD: "postgres123"
  POSTGRES_PASSWORD: "postgres123"
