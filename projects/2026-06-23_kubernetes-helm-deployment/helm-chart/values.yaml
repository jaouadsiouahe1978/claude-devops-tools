# Default values for devops-app
namespace: devops-app

# API Deployment
api:
  name: api
  replicaCount: 2
  image:
    repository: python
    tag: "3.11-slim"
    pullPolicy: IfNotPresent

  port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5

  env:
    DATABASE_HOST: postgres-service
    DATABASE_PORT: "5432"
    DATABASE_USER: postgres
    REDIS_HOST: redis-service
    REDIS_PORT: "6379"
    LOG_LEVEL: INFO

# PostgreSQL Deployment
postgres:
  name: postgres
  replicaCount: 1
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent

  port: 5432

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  env:
    POSTGRES_USER: postgres
    POSTGRES_DB: devops_db

  # Secret reference for password
  secretName: postgres-secret
  secretPasswordKey: password

  # Storage configuration
  storage:
    size: 5Gi
    className: standard

# Redis Deployment
redis:
  name: redis
  replicaCount: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  port: 6379

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

  hosts:
    - host: api.local
      paths:
        - path: /
          pathType: Prefix

  tls:
    - secretName: api-tls
      hosts:
        - api.local

# HPA configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Service account
serviceAccount:
  create: true
  name: devops-app

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
