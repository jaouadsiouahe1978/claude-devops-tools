apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-app.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "devops-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}

        ports:
        - name: postgresql
          containerPort: {{ .Values.postgres.port }}
          protocol: TCP

        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.env.POSTGRES_USER | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.env.POSTGRES_DB | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.secretName }}
              key: {{ .Values.postgres.secretPasswordKey }}

        resources:
          {{- toYaml .Values.postgres.resources | nindent 12 }}

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: {{ include "devops-app.fullname" . }}-postgres-pvc
