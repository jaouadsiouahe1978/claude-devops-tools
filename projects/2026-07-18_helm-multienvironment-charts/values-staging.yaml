# Staging environment values
global:
  environment: staging
  domain: myapp-staging.local

replicaCount: 2

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.24-alpine"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: myapp-staging.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-staging-tls
      hosts:
        - myapp-staging.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

config:
  LOG_LEVEL: "INFO"
  APP_MODE: "staging"
  DEBUG: "false"

podDisruptionBudget:
  enabled: true
  minAvailable: 1
