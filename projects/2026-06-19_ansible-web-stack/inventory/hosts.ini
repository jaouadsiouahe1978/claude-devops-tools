[webservers]
web1.example.com ansible_host=192.168.1.100
web2.example.com ansible_host=192.168.1.101

[dbservers]
db1.example.com ansible_host=192.168.1.200

[monitoring]
mon1.example.com ansible_host=192.168.1.150

[all:vars]
ansible_user=devops
ansible_password=devops
ansible_become_password=devops
ansible_connection=ssh
ansible_port=22

# Pour utiliser avec des clés SSH, remplacer par:
# ansible_ssh_private_key_file=~/.ssh/id_rsa
# Et commenter ansible_password et ansible_become_password
