---
- name: "Create prometheus user"
  user:
    name: prometheus
    shell: /usr/sbin/nologin
    createhome: no
  become: yes
  tags:
    - prometheus

- name: "Create prometheus directories"
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  become: yes
  tags:
    - prometheus

- name: "Download Prometheus"
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.50.0/prometheus-2.50.0.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    checksum: "sha256:6e8c5cc1b90e487c6b87dcf65b13c3659f2ce20ceed6b4fcff2a7c9bdcd17d3a"
  tags:
    - prometheus

- name: "Extract Prometheus"
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: yes
  tags:
    - prometheus

- name: "Copy Prometheus binaries"
  copy:
    src: "/tmp/prometheus-2.50.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool
  become: yes
  tags:
    - prometheus

- name: "Copy Prometheus config template"
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  become: yes
  tags:
    - prometheus

- name: "Create Prometheus systemd service"
  copy:
    content: |
      [Unit]
      Description=Prometheus
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --storage.tsdb.retention.time=30d \
        --web.console.templates=/tmp/prometheus-2.50.0.linux-amd64/consoles \
        --web.console.libraries=/tmp/prometheus-2.50.0.linux-amd64/console_libraries

      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: "reload systemd"
  tags:
    - prometheus

- name: "Enable and start Prometheus"
  systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes
  tags:
    - prometheus

- name: "UFW allow Prometheus"
  ufw:
    rule: allow
    port: "9090"
    proto: tcp
  become: yes
  tags:
    - prometheus

- name: "Wait for Prometheus to be ready"
  wait_for:
    port: 9090
    delay: 2
    timeout: 30
  tags:
    - prometheus

- name: "Clean up downloaded files"
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/prometheus.tar.gz
    - /tmp/prometheus-2.50.0.linux-amd64
  tags:
    - prometheus
    - cleanup
