# Default values for my-app Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Application metadata
replicaCount: 1
nameOverride: ""
fullnameOverride: ""

# Image configuration
image:
  repository: my-app
  pullPolicy: IfNotPresent
  tag: "1.0.0"

# Container resources
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 5000
  annotations: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: my-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Pod configuration
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node affinity and tolerations
nodeSelector: {}
affinity: {}
tolerations: []

# Autoscaling (HPA)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Application environment variables
env:
  ENV: "dev"
  APP_NAME: "MyApp"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  FEATURE_FLAG: "disabled"
  DB_HOST: "postgres.default.svc.cluster.local"
  DB_PORT: "5432"

# ConfigMap data (optional)
configMap:
  enabled: true
  data:
    app.conf: |
      [app]
      version=1.0.0

# Secrets (use with caution, prefer external-secrets)
secrets:
  enabled: false
  # DB_PASSWORD: base64encodedpassword
  # API_KEY: base64encodedkey

# Probes configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# RBAC
rbac:
  create: true
  rules: []

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Priority class
priorityClassName: ""

# DNS policy
dnsPolicy: ClusterFirst

# Restart policy
restartPolicy: Always

# Termination grace period
terminationGracePeriodSeconds: 30
