{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "myapp.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myapp.labels" . }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}

# ⚠️  IMPORTANT: EN PRODUCTION
# 1. Ne JAMAIS stocker les secrets en clair dans values.yaml
# 2. Utiliser External Secrets Operator ou Sealed Secrets
# 3. Ou créer manuellement: kubectl create secret generic myapp-secrets \
#    --from-literal=DATABASE_PASSWORD=XXX \
#    --from-literal=API_KEY=YYY
# 4. Puis commenter section secrets.enabled: false dans values.yaml
{{- end }}
