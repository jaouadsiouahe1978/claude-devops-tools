version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: myapp-postgres
    environment:
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: myapp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network

  # Backend API
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: myapp-backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: myapp_db
      DATABASE_USER: myapp_user
      DATABASE_PASSWORD: postgres123
      FLASK_ENV: development
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile
    container_name: myapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  myapp-network:
    driver: bridge
