# Global configuration for myapp-platform
global:
  namespace: myapp
  environment: dev
  labels:
    app: myapp
    version: "1.0"
  imagePullPolicy: IfNotPresent

# Frontend (Nginx) configuration
frontend:
  enabled: true
  replicaCount: 2

  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent

  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30001

  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    hosts:
      - host: "myapp.local"
        paths:
          - path: /
            pathType: Prefix

  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  healthCheck:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5

# Backend (API) configuration
backend:
  enabled: true
  replicaCount: 2

  image:
    repository: node
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  env:
    NODE_ENV: production
    LOG_LEVEL: info
    API_PORT: 3000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  healthCheck:
    liveness:
      enabled: true
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
    readiness:
      enabled: true
      path: /ready
      initialDelaySeconds: 10
      periodSeconds: 5

  database:
    host: postgresql
    port: 5432
    name: myapp_db
    user: myapp_user
    secretName: db-credentials
    secretKey: password

# PostgreSQL configuration
postgresql:
  enabled: true
  replicaCount: 1

  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

  auth:
    username: myapp_user
    password: MySecurePassword123
    database: myapp_db
    secretName: db-credentials

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: standard
    mountPath: /var/lib/postgresql/data

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  healthCheck:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5

  backup:
    enabled: false
    schedule: "0 2 * * *"  # 2 AM daily
    retention: 7  # days

# Monitoring (optional)
monitoring:
  enabled: false
  prometheus:
    serviceMonitor:
      enabled: false

# Logging (optional)
logging:
  enabled: false
  elasticsearch:
    enabled: false
