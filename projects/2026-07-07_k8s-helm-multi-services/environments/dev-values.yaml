# Development Environment Values
global:
  namespace: myapp-dev
  environment: development
  labels:
    app: myapp
    version: "1.0"
    env: dev

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: Always
  service:
    type: NodePort
    port: 80
    targetPort: 80
    nodePort: 30001
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: node
    tag: "16-alpine"
    pullPolicy: Always
  env:
    NODE_ENV: development
    LOG_LEVEL: debug
    API_PORT: 3000
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

postgresql:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: devuser
    password: devpassword
    database: dev_db
    secretName: db-credentials
  persistence:
    enabled: false
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
