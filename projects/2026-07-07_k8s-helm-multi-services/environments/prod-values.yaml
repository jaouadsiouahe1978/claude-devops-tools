# Production Environment Values
global:
  namespace: myapp-prod
  environment: production
  labels:
    app: myapp
    version: "1.0"
    env: prod

frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

backend:
  enabled: true
  replicaCount: 3
  image:
    repository: node
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  env:
    NODE_ENV: production
    LOG_LEVEL: warn
    API_PORT: 3000
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 75
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

postgresql:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: produser
    password: ProdSecurePassword2024
    database: prod_db
    secretName: db-credentials
  persistence:
    enabled: true
    size: 50Gi
    storageClassName: fast-ssd
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retention: 30
