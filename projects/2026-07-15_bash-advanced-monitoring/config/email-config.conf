# email-config.conf - Email alert configuration

# Email Server Settings
SMTP_SERVER="smtp.gmail.com"
SMTP_PORT=587
SMTP_USE_TLS=true
SMTP_USERNAME=""
SMTP_PASSWORD=""

# Email Recipients
PRIMARY_ADMIN="admin@example.com"
SECONDARY_ADMIN="oncall@example.com"
ALERT_CC=""
ALERT_BCC=""

# Email Subject Templates
EMAIL_SUBJECT_CRITICAL="[CRITICAL] System Alert - $(hostname) $(date +%H:%M:%S)"
EMAIL_SUBJECT_WARNING="[WARNING] System Alert - $(hostname) $(date +%H:%M:%S)"
EMAIL_SUBJECT_INFO="[INFO] System Report - $(hostname) - $(date +%Y-%m-%d)"

# Email Content Templates
EMAIL_HEADER="System Monitoring Alert Report"
EMAIL_FOOTER="---\nGenerated by Bash Advanced Monitoring Toolkit\nFor support, contact: ops-team@example.com"

# Alert Notification Rules
# Send email only on CRITICAL alerts
ALERT_EMAIL_ON_CRITICAL=true

# Send email on WARNING alerts (may be noisy)
ALERT_EMAIL_ON_WARNING=false

# Send email on daily/weekly summary reports
SEND_DAILY_DIGEST=true
SEND_WEEKLY_DIGEST=false

# Alert Severity Levels and Email Recipients
# CRITICAL alerts go to PRIMARY_ADMIN
# WARNING alerts go to SECONDARY_ADMIN
# INFO alerts go to ALERT_CC

# Rate Limiting (prevent email spam)
MIN_EMAIL_INTERVAL=300  # Minimum 5 minutes between consecutive emails for same alert
MAX_EMAILS_PER_HOUR=10  # Maximum emails per hour (burst limit)

# HTML Email Template
USE_HTML_EMAIL=true

# Include attachments
ATTACH_LOG_FILE=false
ATTACH_REPORT=true
MAX_ATTACHMENT_SIZE=5242880  # 5MB

# Email Test Command
# To test email configuration:
# echo "Test alert from Bash Monitoring" | mail -s "Test" admin@example.com
