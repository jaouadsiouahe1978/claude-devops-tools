# alert-rules.conf - Define custom alert rules and patterns

# Format: RULE_NAME="condition" "action" "severity"
# severity: CRITICAL, WARNING, INFO

# CPU Usage Alerts
RULE_HIGH_CPU="cpu > 90" "send_alert" "CRITICAL"
RULE_SUSTAINED_CPU="cpu > 80 for 10min" "send_alert" "WARNING"

# Memory Alerts
RULE_HIGH_RAM="ram > 90" "send_alert" "CRITICAL"
RULE_SWAP_USAGE="swap_used > 50" "send_alert" "WARNING"

# Disk Alerts
RULE_DISK_FULL="disk > 95" "send_alert" "CRITICAL"
RULE_DISK_WARNING="disk > 85" "send_alert" "WARNING"
RULE_INODE_USAGE="inode_used > 80" "send_alert" "WARNING"

# Load Average Alerts
RULE_HIGH_LOAD="load1 > cpu_count" "send_alert" "WARNING"
RULE_SUSTAINED_LOAD="load5 > cpu_count * 2" "send_alert" "CRITICAL"

# Process Alerts
RULE_RUNAWAY_PROCESS="process_cpu > 80" "kill_process" "CRITICAL"
RULE_MEMORY_LEAK="process_mem_growth > 20" "send_alert" "WARNING"

# Network Alerts
RULE_HIGH_TRAFFIC="net_traffic > 100MB/s" "send_alert" "INFO"
RULE_CONNECTION_LIMIT="open_connections > 5000" "send_alert" "WARNING"

# Service Alerts
RULE_SERVICE_DOWN="service_status == down" "restart_service" "CRITICAL"
RULE_SERVICE_SLOW="response_time > 1000ms" "send_alert" "WARNING"

# Log Analysis Alerts
RULE_ERROR_RATE="error_rate > 1%" "send_alert" "WARNING"
RULE_FAILED_LOGIN="failed_login_count > 10" "send_alert" "CRITICAL"
RULE_DISK_IO_ERROR="disk_io_error" "send_alert" "CRITICAL"

# Custom Patterns
PATTERN_KERNEL_PANIC="kernel panic"
PATTERN_OOM_KILLER="Out of memory"
PATTERN_SEGFAULT="Segmentation fault"
PATTERN_PERMISSION_DENIED="Permission denied"

# Alert Actions
# send_alert: Send notification (email, syslog, desktop)
# restart_service: Automatically restart failed service
# kill_process: Terminate runaway process
# scale_up: Trigger auto-scaling (if available)
# create_snapshot: Create system snapshot
# log_event: Log to persistent storage
