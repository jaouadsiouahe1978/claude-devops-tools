# monitor.conf - Configuration for monitoring thresholds and settings

# CPU Usage Threshold (percentage)
# Alert when CPU usage exceeds this value
CPU_THRESHOLD=80

# RAM Usage Threshold (percentage)
# Alert when RAM usage exceeds this value
RAM_THRESHOLD=85

# Disk Usage Threshold (percentage)
# Alert when disk usage exceeds this value
DISK_THRESHOLD=90

# Anomaly Detection Threshold (percentage deviation from baseline)
# Alert when metric deviates more than this percentage from baseline
ANOMALY_THRESHOLD=30

# Email Configuration
# Set to "true" to enable email alerts
ENABLE_EMAIL=false
ALERT_EMAIL="admin@example.com"
SMTP_SERVER="localhost"
SMTP_PORT=25

# Logging Configuration
LOG_LEVEL="INFO"  # DEBUG, INFO, WARN, ERROR
RETENTION_DAYS=30  # Keep logs for this many days

# Monitoring Intervals (in seconds)
MONITOR_INTERVAL=300      # 5 minutes
ANOMALY_CHECK_INTERVAL=3600  # 1 hour
REPORT_INTERVAL=86400     # 24 hours

# System Limits (for process monitoring)
MAX_CPU_PER_PROCESS=50     # Alert if single process uses >50% CPU
MAX_RAM_PER_PROCESS=30     # Alert if single process uses >30% RAM

# Alert Settings
ENABLE_SYSLOG=true         # Log alerts to syslog
ENABLE_DESKTOP_ALERTS=false  # Send desktop notifications
ALERT_RETRY_COUNT=3        # Retry failed alerts this many times
