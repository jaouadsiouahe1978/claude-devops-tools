---
# Rôle Docker : Installation et configuration de Docker & docker-compose

- name: Mettre à jour les paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Ajouter la clé GPG Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajouter le dépôt Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Installer Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Installer docker-compose
  get_url:
    url: "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-linux-x86_64"
    dest: /usr/local/bin/docker-compose
    mode: '0755'

- name: Démarrer et activer le service Docker
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes

- name: Créer un réseau Docker pour l'application
  docker_network:
    name: "{{ docker_network_name }}"
    state: present

- name: Ajouter l'utilisateur actuel au groupe docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  notify: Redémarrer la session utilisateur

- name: Vérifier l'installation de Docker
  command: docker --version
  register: docker_version
  changed_when: false

- name: Afficher la version de Docker
  debug:
    msg: "{{ docker_version.stdout }}"
