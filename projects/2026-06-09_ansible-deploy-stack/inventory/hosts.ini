# Ansible Inventory - Configuration des serveurs
# Ce fichier définit les groupes de serveurs et leurs variables

[webservers]
web1.example.com ansible_host=192.168.1.10 ansible_user=deploy
web2.example.com ansible_host=192.168.1.11 ansible_user=deploy

[databases]
db1.example.com ansible_host=192.168.1.20 ansible_user=deploy

[loadbalancers]
lb1.example.com ansible_host=192.168.1.5 ansible_user=deploy

# Groupe parent contenant tous les serveurs
[all:vars]
# Variables d'authentification
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_timeout=30

# Variables d'environnement
environment_type=production
docker_network_name=app_network
app_port=5000
