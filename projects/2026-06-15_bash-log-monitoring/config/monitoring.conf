# Bash Log Monitoring Configuration
# Date: 2026-06-15

# ============================================================
# LOG FILES TO MONITOR
# ============================================================
LOG_PATHS=(
    "/var/log/syslog"
    "/var/log/auth.log"
)

# ============================================================
# PATTERN DEFINITIONS (Regex)
# ============================================================
ERROR_PATTERN="ERROR|CRITICAL|FATAL|EXCEPTION"
WARN_PATTERN="WARN|WARNING|DEPRECATED"
INFO_PATTERN="INFO|SUCCESS"

# ============================================================
# ALERT THRESHOLDS
# ============================================================
# Number of matches to trigger alert
ALERT_THRESHOLD_ERROR=10
ALERT_THRESHOLD_WARN=20
ALERT_TIME_WINDOW=300          # Time window in seconds (5 minutes)

# ============================================================
# ALERT SUPPRESSION (Avoid spam)
# ============================================================
ALERT_COOLDOWN=600             # Min time between same alert (seconds)
MAX_ALERTS_PER_WINDOW=5        # Max alerts in same time window

# ============================================================
# NOTIFICATIONS
# ============================================================
# Enable/disable notification methods
ENABLE_WEBHOOK=true
ENABLE_EMAIL=false
ENABLE_LOG=true

# Webhook configuration (Slack, Discord, etc.)
WEBHOOK_URL="https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
WEBHOOK_TIMEOUT=10

# Email configuration
ALERT_EMAIL="admin@example.com"
SMTP_SERVER="localhost"
SMTP_PORT=25

# ============================================================
# LOG ROTATION
# ============================================================
ENABLE_ROTATION=true
ROTATION_INTERVAL=86400        # Rotate daily (seconds)
RETENTION_DAYS=30              # Keep logs for N days
COMPRESS_LOGS=true             # gzip old logs
LOG_ARCHIVE_DIR="/tmp/log-archive"

# ============================================================
# REPORTING
# ============================================================
ENABLE_REPORTS=true
REPORT_SCHEDULE="0 22 * * *"   # Daily at 22:00 (cron format)
REPORT_OUTPUT_DIR="data/reports"
REPORT_FORMAT="csv"            # csv, json, or text

# ============================================================
# LOGGING & DEBUGGING
# ============================================================
ALERT_LOG_FILE="data/alerts.log"
MONITOR_LOG_FILE="data/monitor.log"
DEBUG_MODE=false
VERBOSE=true

# ============================================================
# SCRIPT BEHAVIOR
# ============================================================
CHECK_INTERVAL=5               # Check interval in seconds
TAIL_FOLLOW_TIMEOUT=60         # timeout for tail -f (seconds)
PID_FILE="/tmp/log-monitor.pid"
LOCK_FILE="/tmp/log-monitor.lock"

# ============================================================
# SERVICE IDENTIFICATION
# ============================================================
SERVICE_NAME="log-monitor"
ENVIRONMENT="dev"              # dev, staging, prod
HOSTNAME=$(hostname)
