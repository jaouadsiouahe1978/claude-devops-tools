version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - APP_VERSION=1.0.0-dev
      - ENVIRONMENT=development
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  test:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: pip install pytest && python -m pytest tests/ -v --tb=short
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      - web
