name: Build & Test Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'tests/**'
      - '.github/workflows/build.yml'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'tests/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: jaouad-devops/flask-app

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set variables
        id: vars
        run: |
          echo "image_tag=$(git describe --tags --always)" >> $GITHUB_OUTPUT
          echo "python_version=${{ matrix.python-version }}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Test Docker image exists
        run: |
          docker image ls | grep flask-app
          docker inspect ${{ env.IMAGE_NAME }}:latest

      - name: Run tests in container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests:/app/tests \
            ${{ env.IMAGE_NAME }}:latest \
            sh -c "pip install pytest && python -m pytest tests/ -v --tb=short"

      - name: Run linting
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/app:/app/app \
            ${{ env.IMAGE_NAME }}:latest \
            sh -c "pip install pylint && pylint app/app.py --disable=C0111,R0903 || true"

      - name: Check image size
        run: |
          SIZE=$(docker inspect -f='{{json .Size}}' ${{ env.IMAGE_NAME }}:latest)
          echo "Image size: $((SIZE / 1024 / 1024)) MB"
          if [ $((SIZE / 1024 / 1024)) -gt 500 ]; then
            echo "Warning: Image size is large"
            exit 1
          fi

      - name: Test endpoints
        run: |
          docker run -d --name test-app -p 5000:5000 ${{ env.IMAGE_NAME }}:latest
          sleep 5
          curl -f http://localhost:5000/ || exit 1
          curl -f http://localhost:5000/api/hello?name=CI || exit 1
          curl -X POST http://localhost:5000/api/multiply -H "Content-Type: application/json" -d '{"a":2,"b":3}' || exit 1
          docker stop test-app
          docker rm test-app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Generate SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:latest \
            ${{ env.IMAGE_NAME }}:latest \
            -o cyclonedx > sbom.xml || true

      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom-${{ steps.vars.outputs.python_version }}
          path: sbom.xml
        continue-on-error: true

      - name: Build summary
        run: |
          echo "## Build Summary 📦" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: ${{ steps.vars.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Python**: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date**: ${{ steps.vars.outputs.build_date }}" >> $GITHUB_STEP_SUMMARY
