version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: devops-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tasks_db}
      POSTGRES_USER: ${DB_USER:-devops}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devops123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: devops-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - devops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Python Flask Backend API
  flask:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: devops-flask
    environment:
      FLASK_APP: app.py
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-devops}:${DB_PASSWORD:-devops123}@postgres:5432/${DB_NAME:-tasks_db}
      REDIS_URL: redis://redis:6379
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ./app:/app
    networks:
      - devops-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python app.py

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - devops-net
    depends_on:
      - flask
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Adminer - DB Admin Interface
  adminer:
    image: adminer:latest
    container_name: devops-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - devops-net
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  devops-net:
    driver: bridge
