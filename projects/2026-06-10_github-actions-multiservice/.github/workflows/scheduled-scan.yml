name: Scheduled Security Scan

on:
  schedule:
    # Lancer tous les jours à 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fs-scan:
    name: Filesystem & Dependency Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-fs.sarif'
      continue-on-error: true

  config-scan:
    name: Configuration Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: dockerfile,kubernetes
        output_format: sarif
        output_file_path: report.sarif
      continue-on-error: true

    - name: Upload Checkov results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: report.sarif
      continue-on-error: true

  dependency-check:
    name: SBOM & License Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate SBOM with Syft
      uses: anchore/sbom-action@v0
      with:
        path: .
        format: spdx-json
        output-file: sbom-spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v3
      with:
        name: sbom
        path: sbom-spdx.json

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [fs-scan, config-scan, dependency-check]
    if: always()

    steps:
    - name: Create summary
      run: |
        cat << EOF >> $GITHUB_STEP_SUMMARY
        # 🔒 Scheduled Security Scan Report

        **Scan Date**: $(date)
        **Status**: Complete

        ## Scans Performed
        - ✅ Filesystem & Dependency Scan (Trivy)
        - ✅ Configuration Audit (Checkov)
        - ✅ SBOM Generation (Syft)

        ## Results
        Check the **Security** tab for detailed vulnerability reports.

        EOF

    - name: Send notification
      if: vars.SLACK_WEBHOOK_URL != ''
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "🔒 Scheduled security scan completed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Security Scan Report*\nRepo: ${{ github.repository }}\nDate: $(date)\nLink: ${{ github.server_url }}/${{ github.repository }}/security"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true
