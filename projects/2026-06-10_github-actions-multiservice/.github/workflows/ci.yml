name: CI - Tests & Linting

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-python:
    name: Test Python API
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest pytest-cov

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: python
        name: codecov-python-${{ matrix.python-version }}
        fail_ci_if_error: false

  test-node:
    name: Test Node.js Web
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x']

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint with ESLint
      run: |
        npm install eslint --save-dev
        npx eslint src/ --ext .js --max-warnings 0
      continue-on-error: true

    - name: Run tests
      run: npm test -- --coverage

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build-matrix:
    name: Build & Check
    runs-on: ubuntu-latest
    needs: [test-python, test-node]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build API image (no push)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.api
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Web image (no push)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.web
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

  test-docker-compose:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: [test-python, test-node]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Compose
      run: docker-compose up -d

    - name: Wait for services
      run: sleep 5

    - name: Test API health
      run: |
        curl -f http://localhost:5000/health || exit 1

    - name: Test Web health
      run: |
        curl -f http://localhost:3000/ || exit 1

    - name: Logs
      if: always()
      run: docker-compose logs

    - name: Cleanup
      if: always()
      run: docker-compose down

  # Job final qui agrège les résultats
  check:
    name: Check Suite
    runs-on: ubuntu-latest
    needs: [test-python, test-node, security-scan, build-matrix, test-docker-compose]
    if: always()

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.test-python.result }}" != "success" ] || [ "${{ needs.test-node.result }}" != "success" ]; then
          echo "❌ Tests failed"
          exit 1
        fi
        echo "✅ All checks passed!"
